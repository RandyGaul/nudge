name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-msvc:
    name: Windows MSVC (${{ matrix.config }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -A x64 -DNUDGE_BUILD_APP=OFF
      - name: Build nudge_tests
        run: cmake --build build --config ${{ matrix.config }} --target nudge_tests
      - name: Run tests
        run: ./build/${{ matrix.config }}/nudge_tests.exe

  linux-gcc:
    name: Linux GCC Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=gcc -DNUDGE_BUILD_APP=OFF
      - name: Build nudge_tests
        run: cmake --build build --target nudge_tests
      - name: Run tests
        run: ./build/nudge_tests

  linux-clang-asan:
    name: Linux Clang + ASan + UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DCMAKE_C_FLAGS="-O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
          -DNUDGE_BUILD_APP=OFF
      - name: Build nudge_tests
        run: cmake --build build --target nudge_tests
      - name: Run tests
        env:
          ASAN_OPTIONS: halt_on_error=1:abort_on_error=1:detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:abort_on_error=1:print_stacktrace=1
        run: ./build/nudge_tests

